<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Table Reservation System</title>
</head>
<body>
    <div > 
        <h3 id="title"> Table Reservation System: </h3>

        <form id="dev-form">

            <label for="name"> Name: </label>
            <input id="name" class="data-input-initial" name="name" type="text"> <br />


            <label for="date"> Date: </label>
            <input id="date" class="data-input-initial" type="date"> <br />

            <label for="time"> Time: </label>
            <select id="time" class="data-input-initial" ></select> <br />

            <label for="guests"> Guests: </label>
            <select id="guests" class="data-input-initial" ></select> <br />

            <input id="submit" class="data-input-initial submit-btn" type="submit" value="Submit"> 
        </form>
    </div>

    <div id="result"></div>
    
    <div id="current-reservation-presentation">
        <h5 id="reservation-list-title"> Current Reservations: </h5>

        <div id="reservations-list"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
